<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BločekScan AI</title>
    <script src="[https://unpkg.com/react@18/umd/react.production.min.js](https://unpkg.com/react@18/umd/react.production.min.js)"></script>
    <script src="[https://unpkg.com/react-dom@18/umd/react-dom.production.min.js](https://unpkg.com/react-dom@18/umd/react-dom.production.min.js)"></script>
    <script src="[https://unpkg.com/@babel/standalone/babel.min.js](https://unpkg.com/@babel/standalone/babel.min.js)"></script>
    <script src="[https://cdn.tailwindcss.com](https://cdn.tailwindcss.com)"></script>
</head>
<body class="bg-zinc-950 text-zinc-100 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef } = React;
        const API_BASE = "[https://moj-skener.onrender.com](https://moj-skener.onrender.com)";

        function App() {
            const [state, setState] = useState("idle");
            const [receipt, setReceipt] = useState(null);
            const fileInputRef = useRef();

            const handleUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setState("loading");
                const fd = new FormData(); fd.append("file", file);
                try {
                    const res = await fetch(`${API_BASE}/upload`, { method: "POST", body: fd });
                    const data = await res.json();
                    setReceipt(data);
                    setState("review");
                } catch (err) { alert("Chyba: " + err.message); setState("idle"); }
            };

            const handleExport = async () => {
                setState("exporting");
                try {
                    const res = await fetch(`${API_BASE}/export-xlsx`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(receipt)
                    });
                    const blob = await res.blob();
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement("a");
                    a.href = url; a.download = "blocek.xlsx"; a.click();
                } catch (err) { alert("Chyba exportu"); }
                setState("review");
            };

            return (
                <div className="max-w-md mx-auto min-h-screen p-4 flex flex-col">
                    <header className="py-4 border-b border-zinc-800 mb-6 flex justify-between">
                        <h1 className="font-bold text-amber-400">🧾 BločekScan AI</h1>
                        {state === "review" && <button onClick={() => setState("idle")} className="text-xs">Zrušiť</button>}
                    </header>

                    <main className="flex-1">
                        {state === "idle" && (
                            <div className="text-center py-20">
                                <button onClick={() => fileInputRef.current.click()} className="w-full bg-amber-400 text-black p-6 rounded-2xl font-bold text-lg shadow-lg active:scale-95 transition-transform">
                                    📷 Odfoť bloček
                                </button>
                            </div>
                        )}

                        {state === "loading" && <div className="text-center animate-pulse py-20 text-zinc-500">Claude analyzuje bloček...</div>}

                        {state === "review" && receipt && (
                            <div className="space-y-4">
                                <div className="bg-zinc-900 p-4 rounded-xl border border-zinc-800">
                                    <p className="text-xs text-zinc-500 uppercase">Dodávateľ</p>
                                    <input value={receipt.dodavatel} onChange={e => setReceipt({...receipt, dodavatel: e.target.value})} className="bg-transparent w-full font-bold outline-none" />
                                </div>
                                <div className="space-y-2">
                                    {receipt.polozky.map((p, i) => (
                                        <div key={i} className="flex justify-between p-3 bg-zinc-900 rounded-lg text-sm border border-zinc-800">
                                            <span>{p.nazov}</span>
                                            <span className="font-mono text-amber-400">{p.suma_s_dph.toFixed(2)}€</span>
                                        </div>
                                    ))}
                                </div>
                                <button onClick={handleExport} className="w-full bg-zinc-100 text-black font-bold p-4 rounded-xl mt-6">
                                    {state === "exporting" ? "Generujem..." : "Stiahnuť Excel"}
                                </button>
                            </div>
                        )}
                    </main>

                    <input type="file" ref={fileInputRef} onChange={handleUpload} capture="environment" accept="image/*" className="hidden" />
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
